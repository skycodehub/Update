<!DOCTYPE html>
<html>
<head>
  <title>Update Required</title>

  <script>
    const currentVersion = 1;

    fetch("https://raw.githubusercontent.com/skycodehub/Update/main/Update.json")
      .then(response => response.json())
      .then(data => {

        if (data.version_code > currentVersion) {

          // 🚫 Disable back button
          history.pushState(null, null, location.href);
          window.onpopstate = function () {
            history.go(1);
          };

          // 🔥 Force UI (no cancel)
          document.body.innerHTML = `
            <div style="
              display:flex;
              justify-content:center;
              align-items:center;
              height:100vh;
              background:black;
              color:white;
              font-family:sans-serif;
              text-align:center;
            ">
              <div style="
                border:1px solid #444;
                padding:25px;
                border-radius:12px;
                max-width:300px;
              ">
                <h2>${data.title}</h2>
                <p>${data.message.replace(/\\n/g, "<br>")}</p>

                <a href="${data.apk_url}" style="
                  display:block;
                  margin-top:20px;
                  padding:12px;
                  background:white;
                  color:black;
                  text-decoration:none;
                  border-radius:6px;
                  font-weight:bold;
                ">
                  UPDATE NOW 🚀
                </a>

              </div>
            </div>
          `;

        } else {
          window.close();
        }

      });
  </script>

</head>

<body style="margin:0; background:black;">
</body>
</html>
